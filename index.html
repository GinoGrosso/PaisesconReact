<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Digital - Explorador Mundial</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-brand">
          <h1 class="logo">🌍 Atlas Digital</h1>
          <p class="slogan">Explorador Mundial</p>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-page="home">Inicio</button>
          <button class="nav-btn" data-page="recientes">Recientes</button>
        </nav>
      </div>
    </header>

    <main class="main">
      <section id="home-page" class="page active">
        <div class="container">
          <div class="filters">
            <select id="filter-continente" class="filter-select">
              <option value="">Todos los continentes</option>
            </select>
            <select id="filter-idioma" class="filter-select">
              <option value="">Todos los idiomas</option>
            </select>
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="Buscar país..."
            />
          </div>

          <div id="loading" class="loading">Cargando países...</div>
          <div
            id="error-message"
            class="error-message"
            style="display: none"
          ></div>

          <div id="paises-container" class="paises-grid"></div>
        </div>
      </section>

      <section id="recientes-page" class="page">
        <div class="container">
          <h2 class="page-title">Países Recientes</h2>
          <div id="recientes-container" class="paises-grid">
            <p class="empty-message">No has visto ningún país aún.</p>
          </div>
        </div>
      </section>

      <section id="detalle-page" class="page">
        <div class="container">
          <button id="back-btn" class="back-btn">← Volver al catálogo</button>
          <div id="detalle-container"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="slogan-footer">Explorador Mundial</p>
        <p>&copy; 2025 Atlas Digital - Explorador Mundial</p>
      </div>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
